  <style>
    .wm{font-family:'Baloo 2','Segoe UI',system-ui,sans-serif;font-weight:800;font-style:italic;}
    .tag{font-family:'Montserrat','Segoe UI',system-ui,sans-serif;font-weight:600;}
  </style>
